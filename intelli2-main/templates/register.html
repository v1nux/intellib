<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliBreak | Register</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card glass-panel">
        <h1 style="text-align: center; margin-bottom: 2rem">IntelliBreak</h1>
        <h2 style="text-align: center; margin-bottom: 1rem; font-size: 1.2rem; color: var(--text-muted)">Create Account</h2>

        <form id="registerForm">
          <div class="input-group">
            <label for="reg-fullname">Full Name</label>
            <input
              type="text"
              id="reg-fullname"
              name="full_name"
              placeholder="e.g. John Doe"
              required
            />
          </div>

          <div class="input-group">
            <label for="reg-username">Username</label>
            <input
              type="text"
              id="reg-username"
              name="username"
              placeholder="Choose a username"
              required
              minlength="3"
            />
          </div>

          <div class="input-group">
            <label for="reg-password">Password</label>
            <input
              type="password"
              id="reg-password"
              name="password"
              placeholder="Create a password"
              required
              minlength="4"
            />
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            Register
          </button>

          <p
            style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem"
          >
            Already have an account? <a href="{{ url_for('login_page') }}" style="color: var(--primary-color)">Log In</a>
          </p>
        </form>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
